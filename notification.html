<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Максимальная настройка уведомления</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background-color: #f4f6f9;
      color: #333;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 18px;
      background-color: #6c757d;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .back-btn:hover { background-color: #5a6268; }
    
    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    h2 { margin-top: 0; color: #222; }
    .form-group { margin-bottom: 15px; }
    .form-row { display: flex; gap: 15px; }
    .form-row .form-group { flex: 1; }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="text"], input[type="url"], select {
      width: 100%;
      padding: 9px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
    
    .send-btn {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .send-btn:hover { background-color: #218838; }
  </style>
</head>
<body>

  <!-- Кнопка возврата на главную страницу -->
  <a href="https://smirlesha94scor.github.io/simulation/" class="back-btn">← На главную</a>

  <div class="card">
    <h2>Конструктор уведомлений</h2>

    <!-- Основные текстовые поля -->
    <div class="form-group">
      <label for="title">Заголовок (Title):</label>
      <input type="text" id="title" value="Важное сообщение!">
    </div>

    <div class="form-group">
      <label for="body">Основной текст (Body):</label>
      <input type="text" id="body" value="Это подробное описание события в уведомлении.">
    </div>

    <!-- Мedia параметры -->
    <div class="form-group">
      <label for="icon">Иконка приложения (Icon URL):</label>
      <input type="url" id="icon" value="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </div>

    <div class="form-group">
      <label for="image">Большое превью (Image URL):</label>
      <input type="url" id="image" value="https://picsum.photos/600/300">
    </div>

    <div class="form-group">
      <label for="badge">Мини-иконка монохромная (Badge URL):</label>
      <input type="url" id="badge" value="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </div>

    <!-- Направление текста и язык -->
    <div class="form-row">
      <div class="form-group">
        <label for="dir">Направление текста (Dir):</label>
        <select id="dir">
          <option value="auto">Авто (auto)</option>
          <option value="ltr">Слева направо (ltr)</option>
          <option value="rtl">Справа налево (rtl)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="lang">Язык (Lang):</label>
        <input type="text" id="lang" value="ru">
      </div>
    </div>

    <!-- Настройки поведения и идентификации -->
    <div class="form-row">
      <div class="form-group">
        <label for="tag">Тег для замены (Tag):</label>
        <input type="text" id="tag" placeholder="message-group-1">
      </div>

      <div class="form-group">
        <label for="targetUrl">Ссылка при клике (URL):</label>
        <input type="url" id="targetUrl" value="https://smirlesha94scor.github.io/simulation/">
      </div>
    </div>

    <!-- Флаги (Переключатели) -->
    <div class="checkbox-group">
      <input type="checkbox" id="renotify">
      <label for="renotify">Переоповещать при перезаписи тега (Renotify)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="requireInteraction">
      <label for="requireInteraction">Не закрывать автоматически (Require Interaction)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="silent">
      <label for="silent">Без звука и вибрации (Silent)</label>
    </div>

    <button id="sendBtn" class="send-btn">Отправить уведомление</button>
  </div>

  <script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
      // 1. Проверяем поддержку
      if (!('Notification' in window)) {
        alert('Ваш браузер не поддерживает уведомления');
        return;
      }

      // 2. Запрашиваем разрешение
      const permission = await Notification.requestPermission();

      if (permission === 'granted') {
        // 3. Собираем ВСЕ возможные опции API
        const title = document.getElementById('title').value;
        const targetUrl = document.getElementById('targetUrl').value;

        const options = {
          body: document.getElementById('body').value,
          icon: document.getElementById('icon').value || undefined,
          image: document.getElementById('image').value || undefined,
          badge: document.getElementById('badge').value || undefined,
          dir: document.getElementById('dir').value,
          lang: document.getElementById('lang').value,
          tag: document.getElementById('tag').value || undefined,
          renotify: document.getElementById('renotify').checked,
          requireInteraction: document.getElementById('requireInteraction').checked,
          silent: document.getElementById('silent').checked,
          // Паттерн вибрации на мобильных устройствах (вибрирует -> пауза -> вибрирует)
          vibrate: [200, 100, 200] 
        };

        // 4. Отправляем уведомление
        const notification = new Notification(title, options);

        // Клик по уведомлению
        notification.onclick = () => {
          window.open(targetUrl, '_blank');
        };

      } else {
        alert('Уведомления заблокированы в настройках браузера!');
      }
    });
  </script>

</body>
</html>
